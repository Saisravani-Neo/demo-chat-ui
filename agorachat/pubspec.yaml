name: agorachat
description: One-to-one chat POC using Agora Chat SDK and RTC Engine.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.6.3

  # Networking
  dio: ^5.7.0

  # Local storage
  shared_preferences: ^2.3.3

  # Contacts
  flutter_contacts: ^1.1.9+1

  # Permissions
  permission_handler: ^11.3.1

  # Agora Chat (text/voice messaging)
  agora_chat_sdk: ^1.3.2

  # Agora RTC (voice call)
  agora_rtc_engine: ^6.5.0

  # Audio recording — 6.2.1 uses record_linux ^1.3.0 which implements startStream
  record: 6.2.1

  # File paths
  path_provider: ^2.1.5

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true
